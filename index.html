<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafetería Escolar</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="app">

    <!-- Encabezado -->
    <header class="header">
        <h1>Cafetería Escolar</h1>
    </header>

    <!-- Menú -->
    <nav class="menu">
        <button onclick="mostrarSeccion('inicio')">Inicio</button>
        <button onclick="mostrarSeccion('comida')">Comida</button>
        <button onclick="mostrarSeccion('bebidas')">Bebidas</button>
    </nav>

    <!-- Sección Inicio -->
    <section id="inicio" class="seccion activa">
        <h2>Bienvenido</h2>
        <img src="img/cafeteria.png" alt="Cafetería">
        <p>Disfruta de nuestra deliciosa comida escolar.</p>
    </section>

    <!-- Sección Comida -->
    <section id="comida" class="seccion">
        <h2>Comida</h2>

        <div class="card">
            <h3>Torta</h3>
            <p>$25</p>
            <button onclick="comprar('Torta')">Comprar</button>
        </div>

        <div class="card">
            <h3>Hamburguesa</h3>
            <p>$40</p>
            <button onclick="comprar('Hamburguesa')">Comprar</button>
        </div>

    </section>

    <!-- Sección Bebidas -->
    <section id="bebidas" class="seccion">
        <h2>Bebidas</h2>

        <div class="card">
            <h3>Refresco</h3>
            <p>$20</p>
            <button onclick="comprar('Refresco')">Comprar</button>
        </div>

        <div class="card">
            <h3>Jugo</h3>
            <p>$15</p>
            <button onclick="comprar('Jugo')">Comprar</button>
        </div>

    </section>

</div>

<script src="js/app.js"></script>
</body>
</html>
